name: Update Age

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-age:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Calculate age and update SVG
        run: |
          python3 scripts/update_age.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg
          git diff --cached --quiet || git commit -m "chore: update age [skip ci]"
          git push
